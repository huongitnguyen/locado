# Cloudflare Pages configuration for Locado Landing
name = "locado-landing"
compatibility_date = "2024-01-01"
pages_build_output_dir = "./dist"

[vars]
GITHUB_OWNER = "xuandung38"
GITHUB_REPO = "locado"
CACHE_TTL_SECONDS = "120"
ALLOWED_ORIGINS = "https://locado.hxd.app,http://localhost:4321,http://localhost:3000"

# KV namespace for historical stats (Phase 5)
# Uncomment after creating namespace with: wrangler kv:namespace create STATS_KV
# [[kv_namespaces]]
# binding = "STATS_KV"
# id = "your-production-kv-id"
# preview_id = "your-preview-kv-id"
